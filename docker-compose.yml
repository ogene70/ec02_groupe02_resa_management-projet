version: '3.8'
services:
    db:
        image: postgres:15
        container_name: resa_postgres
        restart: always
        environment:
            POSTGRES_USER: resa_user
            POSTGRES_PASSWORD: resa_password
            POSTGRES_DB: resa_db
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data

    pgadmin:
        image: dpage/pgadmin4
        container_name: resa_pgadmin
        restart: always
        environment:
            PGADMIN_DEFAULT_EMAIL: admin@resa.com
            PGADMIN_DEFAULT_PASSWORD: admin
        ports:
            - '5050:80'
        depends_on:
            - db

volumes:
    postgres_data:
